<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Buttons — Sizes" subtitle="sm / default / lg / landing CTA" viewport="700x150" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--cloud); padding: 24px; }
  .grp { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .btn { display: inline-flex; align-items: center; gap: 8px; background: var(--action-red); color: #fff; border: none; border-radius: var(--radius-md); font-family: var(--font-sans); font-weight: 600; cursor: pointer; }
  .sm { height: 36px; padding: 0 14px; font-size: 12px; }
  .df { height: 40px; padding: 0 20px; font-size: 14px; }
  .lg { height: 48px; padding: 0 32px; font-size: 16px; }
  .hero { height: 56px; padding: 0 28px; font-size: 16px; border-radius: 0; }
  .cap { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-top: 7px; text-align: center; }
  .col { display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body>
  <div class="cap">Sizes — h-9 · h-10 · h-12 · h-14 (sharp landing CTA)</div>
  <div class="grp">
    <div class="col"><button class="btn sm">Small</button><div class="lbl">sm</div></div>
    <div class="col"><button class="btn df">Default</button><div class="lbl">default</div></div>
    <div class="col"><button class="btn lg">Large</button><div class="lbl">lg</div></div>
    <div class="col"><button class="btn hero">Get Started &rarr;</button><div class="lbl">landing</div></div>
  </div>
</body>
</html>
