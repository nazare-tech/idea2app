<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Sidebar Navigation" subtitle="Dark rail with Lucide icons + active state" viewport="700x290" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--warm-paper); padding: 20px; }
  .rail { width: 240px; background: var(--card-white); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 14px; }
  .brand { display: flex; align-items: center; gap: 9px; padding: 6px 8px 14px; border-bottom: 1px solid var(--border-subtle); }
  .brand img { width: 26px; }
  .brand span { color: var(--text-primary); font-weight: 700; font-size: 16px; white-space: nowrap; }
  nav { display: flex; flex-direction: column; gap: 3px; padding-top: 12px; }
  a { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: var(--radius-lg); font-size: 14px; font-weight: 500; color: var(--text-secondary); text-decoration: none; }
  a:hover { background: var(--warm-paper); color: var(--text-primary); }
  a.active { background: var(--warm-paper); color: var(--text-primary); }
  a.active svg { color: var(--action-red); }
  a svg { width: 18px; height: 18px; }
</style>
</head>
<body>
  <div class="rail">
    <div class="brand"><img src="../assets/maker-compass-logo.svg" alt=""><span>Maker Compass</span></div>
    <nav>
      <a class="active"><i data-lucide="layout-dashboard"></i>Dashboard</a>
      <a><i data-lucide="folder-kanban"></i>Projects</a>
      <a><i data-lucide="credit-card"></i>Billing</a>
      <a><i data-lucide="settings"></i>Preferences</a>
    </nav>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
