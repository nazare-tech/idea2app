<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Workshop Neutrals" subtitle="Tinted-warm neutrals — never pure #000/#FFF" viewport="700x300" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--cloud); padding: 22px; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .sw { border: 1px solid var(--border-subtle); background: var(--card-white); overflow: hidden; }
  .chip { height: 58px; }
  .meta { padding: 8px 10px; }
  .name { font-weight: 700; font-size: 12px; color: var(--text-primary); }
  .hex { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.03em; color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background: var(--workshop-black);"></div><div class="meta"><div class="name">Workshop Black</div><div class="hex">#1C1917</div></div></div>
    <div class="sw"><div class="chip" style="background: var(--slate-plum);"></div><div class="meta"><div class="name">Slate Plum</div><div class="hex">#4A4040</div></div></div>
    <div class="sw"><div class="chip" style="background: var(--ash-mist);"></div><div class="meta"><div class="name">Ash Mist</div><div class="hex">#8A8480</div></div></div>
    <div class="sw"><div class="chip" style="background: var(--cloud); border-bottom: 1px solid var(--border-subtle);"></div><div class="meta"><div class="name">Cloud</div><div class="hex">#FAFAFA</div></div></div>
    <div class="sw"><div class="chip" style="background: var(--card-white); border-bottom: 1px solid var(--border-subtle);"></div><div class="meta"><div class="name">Card White</div><div class="hex">#FFFFFF</div></div></div>
    <div class="sw"><div class="chip" style="background: var(--warm-paper);"></div><div class="meta"><div class="name">Warm Paper</div><div class="hex">#F5F0EB</div></div></div>
  </div>
</body>
</html>
