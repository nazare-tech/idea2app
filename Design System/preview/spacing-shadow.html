<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Elevation" subtitle="Ambient Soft — the only sanctioned shadow" viewport="700x165" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--cloud); padding: 28px; display: flex; gap: 26px; align-items: center; }
  .card { width: 150px; height: 88px; background: var(--card-white); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); box-shadow: var(--shadow-ambient); }
  .flat { box-shadow: none; }
  .info .t { font-weight: 700; font-size: 13px; color: var(--text-primary); }
  .info .d { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-muted); margin-top: 5px; line-height: 1.5; }
  .info .n { font-size: 11.5px; color: var(--text-secondary); margin-top: 10px; line-height: 1.4; max-width: 30ch; }
</style>
</head>
<body>
  <div style="display:flex; gap:20px;">
    <div class="card"></div>
    <div class="card flat"></div>
  </div>
  <div class="info">
    <div class="t">Ambient Soft</div>
    <div class="d">0 4px 20px rgba(15,23,42,.06)</div>
    <div class="n">The only sanctioned shadow. Flat by default; depth comes from tonal layering, not shadow.</div>
  </div>
</body>
</html>
