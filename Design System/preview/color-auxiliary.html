<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Auxiliary Accents" subtitle="Coral / Sand / Ember — product-internal only" viewport="700x180" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--cloud); padding: 22px; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .sw { border: 1px solid var(--border-subtle); background: var(--card-white); overflow: hidden; }
  .chip { height: 64px; }
  .meta { padding: 8px 11px; }
  .name { font-weight: 700; font-size: 12.5px; color: var(--text-primary); }
  .hex { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.03em; color: var(--text-muted); margin-top: 2px; }
  .use { font-size: 11px; color: var(--text-secondary); margin-top: 3px; line-height: 1.35; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background: var(--warm-coral);"></div><div class="meta"><div class="name">Warm Coral</div><div class="hex">#F4A261</div><div class="use">Chat / brand-icon moments</div></div></div>
    <div class="sw"><div class="chip" style="background: var(--warm-sand);"></div><div class="meta"><div class="name">Warm Sand</div><div class="hex">#E9C46A</div><div class="use">Dependency / advisory</div></div></div>
    <div class="sw"><div class="chip" style="background: var(--warm-ember);"></div><div class="meta"><div class="name">Warm Ember</div><div class="hex">#D95F3B</div><div class="use">Tertiary illustration accent</div></div></div>
  </div>
</body>
</html>
