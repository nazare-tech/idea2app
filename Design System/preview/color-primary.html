<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Primary & Action Colors" subtitle="Action Red, hover, logo orange, destructive" viewport="700x340" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--cloud); padding: 22px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .sw { border: 1px solid var(--border-subtle); background: var(--card-white); overflow: hidden; }
  .chip { height: 72px; display: flex; align-items: flex-end; padding: 10px 12px; }
  .meta { padding: 9px 12px; }
  .name { font-weight: 700; font-size: 13px; color: var(--text-primary); }
  .hex { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.04em; color: var(--text-muted); margin-top: 2px; }
  .use { font-size: 11.5px; color: var(--text-secondary); margin-top: 4px; line-height: 1.4; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw">
      <div class="chip" style="background: var(--action-red);"><span class="mc-label" style="color: #fff; opacity: .9;">Primary</span></div>
      <div class="meta"><div class="name">Action Red</div><div class="hex">#DC2626</div><div class="use">The one brand accent. ≤10% of any screen.</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background: var(--action-red-hover);"></div>
      <div class="meta"><div class="name">Action Red · Hover</div><div class="hex">#B91C1C</div><div class="use">Primary button hover / pressed.</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background: var(--logo-orange);"></div>
      <div class="meta"><div class="name">Logo Orange</div><div class="hex">#FF4000</div><div class="use">Compass mark only. Not for UI.</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background: var(--destructive);"></div>
      <div class="meta"><div class="name">Destructive</div><div class="hex">#C0392B</div><div class="use">Delete / errors. Distinct from Action Red.</div></div>
    </div>
  </div>
</body>
</html>
