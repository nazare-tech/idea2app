<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Landing Card" subtitle="Sharp corners, declarative voice" viewport="700x340" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--cloud); padding: 24px; }
  .cap { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
  .card { background: var(--card-white); border: 1px solid var(--border-subtle); border-radius: 0; padding: 22px; }
  .eyebrow { font-family: var(--font-mono); font-size: 11px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-muted); }
  h3 { margin: 14px 0 0; font-size: 22px; font-weight: 700; letter-spacing: -0.03em; line-height: 1.05; color: var(--text-primary); }
  p { margin: 12px 0 0; font-size: 14px; line-height: 1.5; color: var(--text-secondary); }
  .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 18px; }
  .tag { border: 1px solid var(--border-subtle); background: var(--warm-paper); padding: 6px 11px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="cap">Landing card — sharp corners, declarative voice</div>
  <div class="card">
    <div class="eyebrow">Research</div>
    <h3>Know the market before you commit a sprint.</h3>
    <p>Maker Compass maps competitors, pricing, positioning, and first wedges so your idea starts with context, not guesswork.</p>
    <div class="tags">
      <span class="tag">Competitive scan</span>
      <span class="tag">Audience segments</span>
      <span class="tag">Differentiation</span>
    </div>
  </div>
</body>
</html>
