<html lang="en">

<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--cloud); padding: 26px; display: flex; align-items: center; gap: 34px; }
  .tile { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .mark { width: 84px; height: 84px; display: flex; align-items: center; justify-content: center; }
  .mark img { width: 64px; }
  .onwhite { background: var(--card-white); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); }
  .onpaper { background: var(--warm-paper); border-radius: var(--radius-lg); }
  .appicon .tilebox { width: 84px; height: 84px; border-radius: 18px; background: var(--workshop-black); display: flex; align-items: center; justify-content: center; }
  .appicon svg { width: 50px; height: auto; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }
</style>
