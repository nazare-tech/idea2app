<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Projects Empty State</title>
  <style>
    :root {
      --bg: #f6f4ef;
      --panel: #111111;
      --panel-2: #1f1f1f;
      --border: rgba(255,255,255,0.18);
      --muted: #b8b8b8;
      --muted-2: rgba(184,184,184,0.8);
      --white: #ffffff;
      --cta: #FF3B30;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--white);
    }
    .wrap {
      padding: 32px 56px;
      min-height: 100vh;
    }
    .section {
      background: var(--panel);
      border-radius: 24px;
      padding: 32px;
      max-width: 1180px;
      margin: 0 auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    }
    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .sub {
      margin-top: 8px;
      font-size: 14px;
      color: var(--muted);
    }
    .empty {
      margin-top: 28px;
      border: 1px dashed rgba(255,255,255,0.3);
      background: var(--panel-2);
      border-radius: 16px;
      padding: 40px 24px;
      text-align: center;
    }
    .empty .title {
      font-size: 16px;
      color: var(--muted);
      margin: 0;
    }
    .empty .desc {
      font-size: 14px;
      color: var(--muted-2);
      margin: 6px 0 0;
    }
    .btn {
      display: inline-block;
      margin-top: 16px;
      padding: 10px 20px;
      border-radius: 10px;
      background: var(--cta);
      color: white;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="section">
      <h1>Projects</h1>
      <p class="sub">Manage and organize your AI-powered applications.</p>
      <div class="empty">
        <p class="title">No projects yet.</p>
        <p class="desc">Create your first idea to get started.</p>
        <a class="btn" href="#">New Project</a>
      </div>
    </section>
  </div>
</body>
</html>
